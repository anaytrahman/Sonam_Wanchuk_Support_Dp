<div class="container">

    <div class="card">

        <h2>Crop Your Photo</h2>

        <ng-container *ngIf="isBrowser && imageService.uploadedImage">

            <image-cropper

                [imageBase64]="imageService.uploadedImage"

                [maintainAspectRatio]="true"

                [aspectRatio]="1"

                [roundCropper]="true"

                [cropperMinWidth]="cropperMinWidth"
                [cropperMinHeight]="cropperMinHeight"

                [autoCrop]="true"
                [resetCropOnAspectRatioChange]="true"
                [containWithinAspectRatio]="true"
                [alignImage]="'center'"

                [transform]="transform"

                format="png"

                (imageCropped)="imageCropped($event)"

                (imageLoaded)="imageLoaded()"

                (cropperReady)="cropReady()"

                (loadImageFailed)="loadFailed()">

            </image-cropper>

        </ng-container>

        <div class="slider">

            <label>

                Zoom

            </label>

            <input

                type="range"

                min="1"

                max="3"

                step="0.1"

                [value]="zoom"

                (input)="zoomChange($event)"

            >

        </div>

        <div class="buttons">

            <button
                class="reset"
                (click)="reset()"
            >
                Reset
            </button>

            <button
                class="primary-btn"
                (click)="continue()"
            >
                Continue
            </button>

        </div>

        <div class="loading" *ngIf="loading">

            <div class="spinner"></div>

            <p>

                Generating your profile...

            </p>

        </div>

    </div>
    <div class="share">

            <h3>Support Sonam Wangchuk Campaign</h3>

            <p>
                Help others create their own profile picture.
            </p>

            <button
                class="share-btn"
                (click)="share()"
            >
                Share This Website
            </button>

        </div>

</div>
